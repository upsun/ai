name: Security Checks

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    # Run every Monday at 08:00 UTC to catch newly disclosed CVEs
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  agentaudit:
    name: AgentAudit — AI Package Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Export requirements from pyproject.toml
        # AgentAudit auto-detects from requirements.txt; export from uv lockfile
        run: |
          pip install uv
          uv export --frozen --no-dev --no-hashes \
            --directory evals \
            -o requirements.txt

      - name: AgentAudit Security Scan
        id: audit
        uses: agentaudit-dev/agentaudit-github-action@v1
        with:
          scan-config: "true"   # auto-detects packages from requirements.txt
          fail-on: "unsafe"

      - name: Fail if issues detected
        if: steps.audit.outputs.has-issues == 'true'
        run: |
          echo "Security issues detected — review the summary above."
          exit 1
