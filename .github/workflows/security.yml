name: Security Checks

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  agentaudit:
    name: AgentAudit — AI Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan with AgentAudit CLI
        run: |
          npx agentaudit scan \
            ${{ github.server_url }}/${{ github.repository }} \
            --json --quiet \
            | tee results.json \
            || true   # capture results even when findings are detected

      - name: Display scan summary
        if: always()
        run: |
          if [ -f results.json ]; then
            echo "### AgentAudit Scan Results" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat results.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail on high/critical findings
        run: |
          HIGH=$(jq '[.findings[]? | select(
            (.severity == "high" or .severity == "critical") and
            (.file | startswith("evals/") | not) and
            (.file | startswith("tests/") | not)
          )] | length' results.json)
          if [ "$HIGH" -gt 0 ]; then
            echo "❌ $HIGH high/critical finding(s) detected."
            exit 1
          fi
          echo "✅ No high/critical findings."

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agentaudit-results
          path: results.json
